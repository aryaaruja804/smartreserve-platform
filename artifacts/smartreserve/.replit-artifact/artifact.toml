kind = "web"
previewPath = "/"
title = "SmartReserve"
version = "1.0.0"
id = "artifacts/smartreserve"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22126

[services.development]
run = "pnpm --filter @workspace/smartreserve run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartreserve", "run", "build" ]
publicDir = "artifacts/smartreserve/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22126"
BASE_PATH = "/"
